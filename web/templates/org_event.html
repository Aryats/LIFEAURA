{% include 'organisation_header.html' %}
<!DOCTYPE html>
<html>
<head>
    <title>Organization Calendar</title>

    <!-- FullCalendar CDN -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #edf7f3, #f9fbfa);
        }

        .calendar-wrapper {
            width: 92%;
            max-width: 1200px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            position: relative;
        }

        .calendar-title {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #1b5e20;
            margin-bottom: 20px;
        }

        /* Django Messages */
        .message-box {
            padding: 12px 18px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 500;
            animation: fadeOut 5s forwards;
        }

        .success-msg {
            background-color: #e8f5e9;
            color: #2e7d32;
            border-left: 5px solid #2e7d32;
        }

        .error-msg {
            background-color: #ffebee;
            color: #c62828;
            border-left: 5px solid #c62828;
        }

        @keyframes fadeOut {
            0% {opacity: 1;}
            80% {opacity: 1;}
            100% {opacity: 0;}
        }

        #calendar {
            margin-top: 15px;
        }

        .fc-toolbar-title {
            color: #1b5e20;
            font-weight: 600;
        }

        .fc-button {
            background-color: #1b5e20 !important;
            border: none !important;
            border-radius: 6px !important;
        }

        .fc-button:hover {
            background-color: #2e7d32 !important;
        }

        .fc-day-past {
            background-color: #f2f2f2 !important;
            opacity: 0.5;
            pointer-events: none;
        }

        .fc-event {
            background-color: #43a047 !important;
            border-radius: 8px !important;
            padding: 4px 8px;
            font-size: 12px;
            border: none !important;
            cursor: pointer;
        }

        .fc-event:hover {
            opacity: 0.85;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            z-index: 999;
        }

        .modal-content {
            background: white;
            width: 420px;
            max-width: 95%;
            margin: 8% auto;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #1b5e20;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .modal-content button {
            width: 100%;
            padding: 10px;
            background: #1b5e20;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-content button:hover {
            background: #2e7d32;
        }

        .close-btn {
            float: right;
            font-size: 20px;
            cursor: pointer;
            color: #777;
        }

        .close-btn:hover {
            color: #c62828;
        }
    </style>
</head>

<body>

<div class="calendar-wrapper">

    <div class="calendar-title">Organization Event Calendar</div>

    <!-- Django Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="message-box {% if message.tags == 'success' %}success-msg{% else %}error-msg{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div id="calendar"></div>
</div>

<!-- Add Event Modal -->
<div class="modal" id="eventModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">×</span>
        <h3>Add New Event</h3>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="event_date" id="event_date">
            <input type="text" name="title" placeholder="Event Title" required>
            <textarea name="description" rows="3" placeholder="Event Description"></textarea>
            <button type="submit">Add Event</button>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    var calendarEl = document.getElementById('calendar');
    var today = new Date();
    today.setHours(0,0,0,0);

    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        height: 650,
        selectable: true,

        validRange: {
            start: today.toISOString().split('T')[0]
        },

        dateClick: function(info) {
            var clickedDate = new Date(info.dateStr);
            clickedDate.setHours(0,0,0,0);

            if (clickedDate < today) {
                showMessage("You cannot add events on past dates.", "error");
                return;
            }

            document.getElementById('event_date').value = info.dateStr;
            document.getElementById('eventModal').style.display = "block";
            document.body.style.overflow = "hidden";
        },

        events: {
            url: "/get_org_events/",
            method: "GET"
        },

        eventClick: function(info) {

            let eventId = info.event.id;

            if (!eventId) {
                showMessage("Event ID missing.", "error");
                return;
            }

            if (confirm("Delete this event?")) {

                fetch("/delete_event/" + eventId + "/", {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": getCSRFToken(),
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === "deleted") {
                        info.event.remove();
                        showMessage("Event deleted successfully.", "success");
                    } else {
                        showMessage("Delete failed.", "error");
                    }
                });
            }
        }
    });

    calendar.render();
});

function closeModal() {
    document.getElementById('eventModal').style.display = "none";
    document.body.style.overflow = "auto";
}

function getCSRFToken() {
    let cookieValue = null;
    let cookies = document.cookie.split(';');
    for (let cookie of cookies) {
        cookie = cookie.trim();
        if (cookie.startsWith("csrftoken=")) {
            cookieValue = cookie.substring("csrftoken=".length);
        }
    }
    return cookieValue;
}

function showMessage(text, type) {
    let box = document.createElement("div");
    box.className = "message-box " + (type === "success" ? "success-msg" : "error-msg");
    box.innerText = text;

    document.querySelector(".calendar-wrapper").prepend(box);

    setTimeout(() => {
        box.remove();
    }, 5000);
}
</script>

</body>
</html>
{% include 'organisation_footer.html' %}
