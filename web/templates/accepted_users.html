{% include 'hospital_header.html' %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Details</title>

    <style>
        /* ===== Layout (footer at bottom) ===== */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #eef7f1, #f9fbfa);
        }

        main {
            flex: 1;
            padding: 30px;
        }

        /* ===== Page Heading ===== */
        .page-title {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: #2e7d32;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* ===== Table Styling ===== */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        th, td {
            padding: 14px 12px;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #f1f8f4;
            transition: background 0.3s;
        }

        /* ===== Chat Button Styling ===== */
        .chat-btn {
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: linear-gradient(135deg, #1e88e5, #1565c0);
            color: #ffffff;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            main {
                padding: 15px;
            }

            th, td {
                padding: 10px;
                font-size: 13px;
            }
        }

        /* ===== Footer normal (no card look) ===== */
        #footer {
            width: 100%;
            margin-top: auto;
            border-radius: 0 !important;
            box-shadow: none !important;
        }

        #footer .container,
        #footer .container-fluid {
            max-width: 100% !important;
            box-shadow: none !important;
            border-radius: 0 !important;
        }
    </style>
</head>

<body>

<main>

    <div class="page-title">ACCEPTED DONORS</div>

    <table>
        <thead>
            <tr>
                <th>Sl.No</th>
                <th>Name</th>
                <th>Blood Group</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Meenu</td>
                <td>A Positive</td>
                <td>Kannookadan</td>
                <td>
                    <button class="chat-btn">Chat</button>
                </td>
            </tr>

            <tr>
                <td>2</td>
                <td>Meenu</td>
                <td>A Positive</td>
                <td>Kannookadan</td>
                <td>
                    <button class="chat-btn">Chat</button>
                </td>
            </tr>
        </tbody>
    </table>

</main>

</body>
</html>
