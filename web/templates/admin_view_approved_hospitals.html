{% include 'admin_header.html' %}

<style>
  /* ===============================
     ADMIN – APPROVED HOSPITALS
     PREMIUM GOLDEN STYLING
     =============================== */

  .admin-page-title {
    color: #f5a425;
    font-weight: 700;
    letter-spacing: 0.6px;
  }

  /* Card wrapper */
  .admin-card {
    background: #ffffff;
    border-radius: 14px;
    border-top: 5px solid #f5a425;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    padding: 20px;
  }

  /* Table */
  .admin-table {
    border-radius: 12px;
    overflow: hidden;
  }

  .admin-table thead {
    background: linear-gradient(135deg, #f5a425, #d18a1f);
    color: #ffffff;
  }

  .admin-table th {
    font-weight: 600;
    text-align: center;
    font-size: 14px;
    padding: 14px;
  }

  .admin-table td {
    text-align: center;
    vertical-align: middle;
    font-size: 14px;
    padding: 14px;
  }

  .admin-table tbody tr {
    transition: background 0.3s, transform 0.2s;
  }

  .admin-table tbody tr:hover {
    background: rgba(245, 164, 37, 0.08);
    transform: scale(1.01);
  }

  /* Empty state */
  .empty-text {
    font-weight: 600;
    color: #777;
  }
</style>

<main class="main-wrapper">
  <div class="container mt-4">

    <h3 class="mb-4 text-center admin-page-title">
      Approved Hospitals
    </h3>

    <div class="admin-card">
      <div class="table-responsive admin-table">
        <table class="table table-bordered mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Hospital Name</th>
              <th>Email</th>
              <th>Phone</th>
            </tr>
          </thead>

          <tbody>
            {% for h in hospitals %}
            <tr>
              <td>{{ forloop.counter }}</td>
              <td>{{ h.hospital_name }}</td>
              <td>{{ h.email }}</td>
              <td>{{ h.phone }}</td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="4" class="text-center empty-text">
                No approved hospitals
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>

  </div>
</main>

{% include 'admin_footer.html' %}
